version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: staylux_db
    environment:
      POSTGRES_USER: staylux
      POSTGRES_PASSWORD: stayluxpassword
      POSTGRES_DB: hotel_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staylux -d hotel_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: staylux_backend
    environment:
      - DATABASE_URL=postgresql://staylux:stayluxpassword@db:5432/hotel_booking
      - FRONTEND_URL=http://localhost
      - SECRET_KEY=hotel-booking-super-secret-key-change-in-production-2026
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staylux_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
